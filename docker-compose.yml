version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workshop
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3002:3001"
    environment:
      DATABASE_URL: postgresql://workshop:workshop123@db:5432/workshop
      JWT_SECRET: ${JWT_SECRET:-minfy-workshop-secret-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-MINFY2026}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./minfy-claude-workshop.html:/usr/share/nginx/html/index.html:ro
      - ./claude-code-cheatsheet.html:/usr/share/nginx/html/cheatsheet.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
