<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Workshop — Minfy AI CoE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════
   MINFY AI CoE — CLAUDE CODE WORKSHOP
   Color Palette: Minfy Blue #1C55BB + Light background
   ═══════════════════════════════════════════ */

:root {
  /* Minfy Brand */
  --primary: #1C55BB;
  --primary-dark: #1444A0;
  --primary-light: #2B6AD8;
  --primary-soft: rgba(28, 85, 187, 0.10);
  --primary-glow: rgba(28, 85, 187, 0.06);
  /* Light theme surfaces */
  --bg: #F4F7FD;
  --surface: #FFFFFF;
  --surface2: #F0F4FB;
  --surface3: #E8EDF8;
  --border: #D5DFF0;
  --border-light: #E8EDF8;
  /* Text */
  --text: #0F1B35;
  --text2: #3D5080;
  --text-muted: #6B7FA8;
  /* Accents */
  --orange: #E8580A;
  --orange-soft: rgba(232, 88, 10, 0.10);
  --green: #1A7A4A;
  --green-soft: rgba(26, 122, 74, 0.10);
  --amber: #C47A00;
  --amber-soft: rgba(196, 122, 0, 0.10);
  --purple: #6B3FA0;
  --purple-soft: rgba(107, 63, 160, 0.10);
  /* Aliases for compat */
  --dark: #0F1B35;
  --dark2: #FFFFFF;
  --dark3: #F0F4FB;
  --light: #0F1B35;
  --light2: #3D5080;
  --mid-gray: #6B7FA8;
  --light-gray: #D5DFF0;
  --teal: #1C55BB;
  --teal-soft: rgba(28, 85, 187, 0.10);
  --blue: #1C55BB;
  --sidebar-width: 260px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 3px rgba(28,85,187,0.08);
  --shadow-md: 0 4px 16px rgba(28,85,187,0.12);
  --shadow-lg: 0 8px 32px rgba(28,85,187,0.16);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  min-height: 100vh;
}
h1, h2, h3, h4, h5, h6 { font-family: 'Syne', sans-serif; line-height: 1.25; font-weight: 700; color: var(--text); }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--primary-soft);
  border: 1px solid rgba(28,85,187,0.18);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  font-size: 0.85em;
  color: var(--primary-dark);
}
pre {
  background: #1a2540;
  border: 1px solid rgba(28,85,187,0.25);
  color: #e8f0ff;
  padding: 1rem 1.25rem;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  font-size: 0.83rem;
  line-height: 1.6;
  margin: 0.75rem 0;
  max-width: 100%;
  position: relative;
}
pre code { background: none; border: none; padding: 0; color: #ffffff; font-size: inherit; white-space: pre-wrap; word-wrap: break-word; }
.copy-btn {
  position: absolute; top: 0.5rem; right: 0.5rem;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.45); border-radius: 4px; padding: 4px 6px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.copy-btn:hover { background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.9); }
.copy-btn.copied { color: #6bcf9f; border-color: rgba(107,207,159,0.4); }
.copy-btn svg { width: 16px; height: 16px; }

/* ═══════ GLOBAL SVG SAFETY — no SVG ever stretches full width ═══════ */
.reference-header svg, .reference-chevron,
.task-status-icon svg,
.adv-tryit-toggle svg,
.nav-item svg, .logout-btn svg { display: block; flex-shrink: 0; overflow: visible; }
/* Hard-cap inline icon SVGs */
.reference-chevron { width: 16px !important; height: 16px !important; max-width: 16px !important; }
.reference-header > svg:first-child { width: 18px !important; height: 18px !important; max-width: 18px !important; }
.task-status-icon svg { width: 14px !important; height: 14px !important; max-width: 14px !important; }
.adv-tryit-toggle svg { width: 16px !important; height: 16px !important; max-width: 16px !important; }
.nav-item svg { width: 18px !important; height: 18px !important; max-width: 18px !important; }

/* ═══════ SUBTLE GRID BACKGROUND ═══════ */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(28,85,187,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(28,85,187,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ═══════ LOGIN SCREEN ═══════ */
.login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(145deg, #0F1B35 0%, #1C3070 50%, #1C55BB 100%);
  position: relative; overflow: hidden; z-index: 1;
}
.login-screen .glow1 {
  position: absolute; top: -20%; right: -10%; width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(28,85,187,0.25) 0%, transparent 65%);
  border-radius: 50%; animation: loginGlow 10s ease-in-out infinite;
}
.login-screen .glow2 {
  position: absolute; bottom: -20%; left: -10%; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(232,88,10,0.12) 0%, transparent 65%);
  border-radius: 50%; animation: loginGlow 12s ease-in-out infinite reverse;
}
@keyframes loginGlow {
  0%, 100% { transform: scale(1) translate(0,0); }
  50% { transform: scale(1.12) translate(15px, -10px); }
}
.login-container { position: relative; z-index: 2; width: 100%; max-width: 440px; padding: 2rem; }
.login-logo { text-align: center; margin-bottom: 2.5rem; }
.minfy-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
  padding: 0.35rem 0.9rem; border-radius: 20px; margin-bottom: 1.25rem;
  font-size: 0.78rem; font-weight: 600; color: #fff; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.minfy-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #7eb8ff; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.login-logo .logo-icon {
  width: 64px; height: 64px; margin: 0 auto 1rem;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; box-shadow: 0 0 30px rgba(28,85,187,0.4);
}
.login-logo h1 { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; }
.login-logo h1 span { color: #7eb8ff; }
.login-logo p { color: rgba(255,255,255,0.65); font-size: 0.9rem; margin-top: 0.4rem; }
.login-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius);
  padding: 2rem; backdrop-filter: blur(20px);
}
.login-card h2 { color: #fff; font-size: 1.1rem; margin-bottom: 1.5rem; font-family: 'DM Sans', sans-serif; font-weight: 600; }
.form-group { margin-bottom: 1.25rem; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 600;
  color: rgba(255,255,255,0.6); margin-bottom: 0.4rem;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.form-group input {
  width: 100% !important; 
  padding: 0.75rem 1rem;
  background: rgba(255,255,255,0.12) !important; 
  border: 1px solid rgba(255,255,255,0.3) !important;
  border-radius: var(--radius-sm); 
  color: #fff !important;
  font-family: 'DM Sans', sans-serif; 
  font-size: 0.95rem;
  transition: var(--transition); 
  outline: none;
  display: block !important; 
  visibility: visible !important;
  min-height: 44px !important;
  -webkit-text-fill-color: #fff !important;
  opacity: 1 !important;
}
.form-group input::placeholder { 
  color: rgba(255,255,255,0.45) !important; 
  opacity: 1 !important;
}
.form-group input:-webkit-autofill,
.form-group input:-webkit-autofill:hover,
.form-group input:-webkit-autofill:focus {
  -webkit-text-fill-color: #fff !important;
  -webkit-box-shadow: 0 0 0px 1000px rgba(255,255,255,0.12) inset !important;
  transition: background-color 5000s ease-in-out 0s;
}
.form-group input:focus { border-color: #7eb8ff; box-shadow: 0 0 0 3px rgba(126,184,255,0.18); }

/* Force admin password input to be visible */
#admin-bootstrap-password {
  display: block !important;
  visibility: visible !important;
  opacity: 1 !important;
  width: 100% !important;
  height: 44px !important;
  min-height: 44px !important;
  padding: 0.75rem 1rem !important;
  background: #1a2540 !important;
  border: 2px solid #4a7bc8 !important;
  border-radius: 6px !important;
  color: #ffffff !important;
  font-size: 0.95rem !important;
  -webkit-text-fill-color: #ffffff !important;
  box-sizing: border-box !important;
  position: relative !important;
  z-index: 10 !important;
  font-family: 'DM Sans', sans-serif !important;
}
#admin-bootstrap-password:hover {
  background: #243555 !important;
  border-color: #5a8bd8 !important;
}
#admin-bootstrap-password::placeholder {
  color: rgba(255,255,255,0.6) !important;
  opacity: 1 !important;
}
#admin-bootstrap-password:focus {
  background: #243555 !important;
  border-color: #7eb8ff !important;
  box-shadow: 0 0 0 3px rgba(126,184,255,0.3) !important;
  outline: none !important;
}

/* Inline admin password input - light theme for main content area */
#admin-pw-inline {
  display: block !important;
  visibility: visible !important;
  opacity: 1 !important;
  width: 100% !important;
  height: 44px !important;
  min-height: 44px !important;
  padding: 0.75rem 1rem !important;
  background: var(--surface) !important;
  border: 2px solid var(--border) !important;
  border-radius: 6px !important;
  color: var(--text) !important;
  font-size: 0.95rem !important;
  -webkit-text-fill-color: var(--text) !important;
  box-sizing: border-box !important;
  position: relative !important;
  z-index: 10 !important;
  font-family: 'DM Sans', sans-serif !important;
}
#admin-pw-inline:hover {
  background: var(--surface2) !important;
  border-color: var(--primary) !important;
}
#admin-pw-inline::placeholder {
  color: var(--text-muted) !important;
  opacity: 1 !important;
}
#admin-pw-inline:focus {
  background: var(--surface2) !important;
  border-color: var(--primary) !important;
  box-shadow: 0 0 0 3px rgba(28,85,187,0.15) !important;
  outline: none !important;
}

.login-error { color: #ffb38a; font-size: 0.85rem; margin-bottom: 1rem; display: none; font-weight: 500; }
.login-error.visible { display: block; }
.login-sublink { display: block; text-align: center; margin-top: 0.75rem; font-size: 0.8rem; color: rgba(255,255,255,0.5); }
.login-sublink:hover { color: #7eb8ff; text-decoration: none; }

/* ═══════ BUTTONS ═══════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.7rem 1.4rem; border: none; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: var(--transition); text-decoration: none; white-space: nowrap;
}
.btn-primary {
  width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; letter-spacing: 0.01em;
}
.btn-primary:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(28,85,187,0.35); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2);
}
.btn-ghost:hover { background: var(--surface2); border-color: var(--primary); color: var(--primary); }
.btn-done {
  background: var(--primary-soft); border: 1px solid rgba(28,85,187,0.25);
  color: var(--primary); padding: 0.6rem 1.5rem;
}
.btn-done:hover { background: rgba(28,85,187,0.18); box-shadow: 0 0 15px rgba(28,85,187,0.18); }
.btn-done.is-completed {
  background: rgba(26,122,74,0.10); border-color: rgba(26,122,74,0.3); color: var(--green);
}
.btn-sm { padding: 0.45rem 1rem; font-size: 0.82rem; }

/* ═══════ APP SHELL ═══════ */
.app-shell { display: none; height: 100vh; overflow: hidden; }
.app-shell.active { display: flex; }

/* ═══════ SIDEBAR ═══════ */
.sidebar {
  width: var(--sidebar-width); min-width: var(--sidebar-width);
  background: linear-gradient(180deg, #0F1B35 0%, #1C3070 100%);
  display: flex; flex-direction: column;
  position: relative; z-index: 10; height: 100vh; overflow-y: auto;
}
.sidebar-header { padding: 1.25rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-brand { display: flex; align-items: center; gap: 0.75rem; }
.sidebar-logo {
  width: 34px; height: 34px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.sidebar-brand-text h2 { font-size: 0.95rem; font-weight: 700; color: #fff; font-family: 'Syne', sans-serif; }
.sidebar-brand-text span { font-size: 0.72rem; color: rgba(255,255,255,0.5); font-weight: 500; }
.workshop-badge {
  margin-top: 0.75rem; padding: 0.3rem 0.6rem;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px; font-size: 0.72rem; color: #7eb8ff;
  font-family: 'JetBrains Mono', monospace; text-align: center; display: none;
}
.sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.65rem 0.85rem; border-radius: var(--radius-sm);
  background: none; border: none; color: rgba(255,255,255,0.55);
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  cursor: pointer; transition: var(--transition); width: 100%; text-align: left;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.14); color: #fff; }
.nav-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 0.5rem 0; }
.sidebar-footer { padding: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); }
.user-info { display: flex; align-items: center; gap: 0.75rem; }
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), #f08040);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 700; color: white; flex-shrink: 0;
}
.user-details { flex: 1; min-width: 0; }
.user-details .name { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-details .points { font-size: 0.75rem; color: #7eb8ff; font-family: 'JetBrains Mono', monospace; }
.logout-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.45);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); flex-shrink: 0;
}
.logout-btn:hover { background: rgba(232,88,10,0.2); border-color: rgba(232,88,10,0.5); color: #ffb38a; }

/* ═══════ MOBILE ═══════ */
.mobile-menu-btn {
  display: none; position: fixed; top: 1rem; left: 1rem; z-index: 100;
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: var(--primary); border: none;
  color: #fff; cursor: pointer; align-items: center; justify-content: center;
}
.mobile-overlay {
  display: none; position: fixed; inset: 0; z-index: 9;
  background: rgba(15,27,53,0.5); backdrop-filter: blur(4px);
}
@media (max-width: 768px) {
  .mobile-menu-btn { display: flex; }
  .sidebar {
    position: fixed; left: -100%; top: 0; height: 100vh; z-index: 20;
    transition: left 0.3s ease; box-shadow: var(--shadow-lg);
  }
  .sidebar.open { left: 0; }
  .mobile-overlay.open { display: block; }
  .main-content { padding: 1rem; padding-top: 4rem; }
}

/* ═══════ MAIN CONTENT ═══════ */
.main-content { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--bg); min-width: 0; }
.page-header {
  padding: 2rem 2.5rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.page-header h1 { font-size: 1.5rem; color: var(--text); }
.page-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
.page-body { padding: 1.75rem 2.5rem; max-width: 900px; width: 100%; }
.page-loading { display: flex; align-items: center; gap: 0.75rem; color: var(--text-muted); padding: 2rem 0; }

/* ═══════ SPINNER ═══════ */
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(28,85,187,0.2);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════ PREREQS / INTRO BANNER ═══════ */
.prereqs-banner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
  box-shadow: var(--shadow-sm);
}
.prereqs-banner h3 { font-size: 0.82rem; color: var(--primary); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Sans', sans-serif; font-weight: 700; }
.prereqs-banner ul { list-style: none; padding: 0; }
.prereqs-banner li { padding: 0.25rem 0; color: var(--text2); font-size: 0.88rem; padding-left: 1.2rem; position: relative; }
.prereqs-banner li::before { content: '→'; position: absolute; left: 0; color: var(--primary); font-size: 0.8rem; top: 0.3rem; }
.permissions-note {
  margin-top: 1rem; padding: 0.75rem 1rem;
  background: var(--primary-soft); border: 1px solid rgba(28,85,187,0.15);
  border-radius: var(--radius-sm); font-size: 0.84rem; color: var(--text2);
}
.permissions-note strong { color: var(--primary); }

/* ═══════ AI COE MASCOT BANNER ═══════ */
.clawd-mascot {
  display: flex; align-items: center; gap: 1.25rem;
  background: linear-gradient(135deg, rgba(28,85,187,0.07), rgba(43,106,216,0.04));
  border: 1px solid rgba(28,85,187,0.15); border-radius: var(--radius);
  padding: 1rem 1.5rem; margin-bottom: 1.5rem;
}
.clawd-mascot .emoji { font-size: 2rem; }
.clawd-text { font-size: 0.88rem; color: var(--text2); }
.clawd-text strong { color: var(--primary); }

/* ═══════ REFERENCE CARD ═══════ */
.reference-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 1.5rem; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.reference-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.9rem 1.25rem; cursor: pointer; user-select: none;
  color: var(--text2); font-size: 0.88rem; font-weight: 600;
  transition: background 0.15s;
}
.reference-header:hover { background: var(--surface2); }
.reference-header > svg { color: var(--primary); flex-shrink: 0; width: 18px; height: 18px; }
.reference-chevron { margin-left: auto; transition: transform 0.25s; width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); }
.reference-card.expanded .reference-chevron { transform: rotate(180deg); }
.reference-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.reference-card.expanded .reference-body { max-height: 2000px; }
.reference-body-inner { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); }
.reference-body-inner h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--primary); margin-bottom: 0.75rem; margin-top: 1.25rem; font-family: 'DM Sans', sans-serif; font-weight: 700; }
.reference-body-inner h4:first-child { margin-top: 0; }
.reference-body-inner table { width: 100%; border-collapse: collapse; font-size: 0.84rem; margin-bottom: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.reference-body-inner thead tr { background: var(--surface2); }
.reference-body-inner th { padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--border); text-align: left; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
.reference-body-inner td { padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--border-light); color: var(--text2); }
.reference-body-inner td:first-child { font-weight: 600; color: var(--text); width: 38%; background: rgba(28,85,187,0.03); }
.reference-body-inner tr:last-child td { border-bottom: none; }
.reference-body-inner ul { list-style: none; padding: 0; }
.reference-body-inner ul li { padding: 0.2rem 0 0.2rem 1rem; position: relative; color: var(--text2); font-size: 0.88rem; }
.reference-body-inner ul li::before { content: '→'; position: absolute; left: 0; color: var(--primary); font-size: 0.75rem; top: 0.35rem; }

/* ═══════ PROGRESS ═══════ */
.progress-section { margin-bottom: 1.5rem; }
.progress-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.completed-count { font-size: 0.85rem; color: var(--text-muted); }
.points-total { font-size: 0.85rem; color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.progress-bar-track { height: 6px; background: var(--surface3); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.6s ease; }

/* ═══════ TASKS ═══════ */
.tasks-section-label {
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.75rem;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}
.task-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
.task-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
  box-shadow: var(--shadow-sm);
}
.task-card:hover { border-color: rgba(28,85,187,0.3); box-shadow: var(--shadow-md); }
.task-card.completed { border-color: rgba(26,122,74,0.3); background: rgba(26,122,74,0.02); }
.task-card.locked { opacity: 0.55; }
.task-header {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.25rem; cursor: pointer; user-select: none;
}
.task-status-icon {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--text-muted); transition: var(--transition);
}
.task-status-icon svg { width: 14px; height: 14px; flex-shrink: 0; }
.task-status-icon.done { background: rgba(26,122,74,0.12); border-color: var(--green); color: var(--green); }
.task-card:not(.locked):not(.completed) .task-status-icon { border-color: rgba(28,85,187,0.3); color: var(--primary); }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 0.92rem; font-weight: 600; color: var(--text); }
.task-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.15rem; }
.task-subtitle.locked-hint { color: var(--text-muted); opacity: 0.6; }
.task-meta { flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem; }

/* ─── POINTS TIER BADGES ─── */
.task-points {
  font-size: 0.72rem; font-weight: 700; padding: 0.22rem 0.65rem;
  border-radius: 20px; font-family: 'DM Sans', sans-serif;
  display: inline-flex; align-items: center; gap: 0.3rem;
}
/* Tier: Must Do (core mandatory) */
.task-points.tier-must {
  background: rgba(28,85,187,0.12); color: var(--primary);
  border: 1px solid rgba(28,85,187,0.25);
}
/* Tier: Core (main steps) */
.task-points.tier-core {
  background: rgba(28,85,187,0.08); color: var(--primary-dark);
  border: 1px solid rgba(28,85,187,0.18);
}
/* Tier: Try It */
.task-points.tier-try {
  background: rgba(196,122,0,0.10); color: var(--amber);
  border: 1px solid rgba(196,122,0,0.22);
}
/* Tier: Level Up / Stretch */
.task-points.tier-stretch {
  background: rgba(26,122,74,0.10); color: var(--green);
  border: 1px solid rgba(26,122,74,0.22);
}

/* XP Legend */
.xp-legend {
  display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
  padding: 0.85rem 1.1rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  align-items: center;
}
.xp-legend-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-right: 0.25rem; }
.xp-legend-item {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.6rem;
  border-radius: 20px;
}
.xp-legend-item.tier-must   { background: rgba(28,85,187,0.10); color: var(--primary); border: 1px solid rgba(28,85,187,0.2); }
.xp-legend-item.tier-core   { background: rgba(28,85,187,0.06); color: var(--primary-dark); border: 1px solid rgba(28,85,187,0.15); }
.xp-legend-item.tier-try    { background: rgba(196,122,0,0.10); color: var(--amber); border: 1px solid rgba(196,122,0,0.2); }
.xp-legend-item.tier-stretch{ background: rgba(26,122,74,0.10); color: var(--green); border: 1px solid rgba(26,122,74,0.2); }
.xp-legend-item.tier-free   { background: rgba(107,63,160,0.10); color: var(--purple); border: 1px solid rgba(107,63,160,0.2); }

.task-tier-label {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
  padding: 0.18rem 0.5rem; border-radius: 4px;
}
.tier-must .task-tier-label { background: var(--primary); color: #fff; }
.tier-core .task-tier-label { background: var(--primary-soft); color: var(--primary); }
.tier-bonus .task-tier-label { background: var(--orange-soft); color: var(--orange); }
.tier-free .task-tier-label { background: var(--purple-soft); color: var(--purple); }

.task-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.task-card.expanded .task-body { max-height: 9999px; }
.task-body-inner { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); }
.task-body-inner h4 { font-size: 0.85rem; color: var(--text); margin: 1.1rem 0 0.5rem; font-family: 'DM Sans', sans-serif; font-weight: 600; }
.task-body-inner h4:first-child { margin-top: 0; }
.task-body-inner p { font-size: 0.88rem; color: var(--text2); margin-bottom: 0.6rem; }
.task-body-inner ul, .task-body-inner ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
.task-body-inner li { font-size: 0.88rem; color: var(--text2); padding: 0.15rem 0; }
.task-body-inner strong { color: var(--text); }
.task-body-inner a { color: var(--primary); }
.task-body-inner table { width: 100%; border-collapse: collapse; font-size: 0.84rem; margin: 0.75rem 0; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.task-body-inner th { padding: 0.5rem 0.75rem; background: var(--surface2); border-bottom: 1px solid var(--border); text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 700; }
.task-body-inner td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border-light); color: var(--text2); }
.task-body-inner tr:last-child td { border-bottom: none; }
.task-note {
  margin-top: 1rem; padding: 0.75rem 1rem;
  background: rgba(232,88,10,0.07); border-left: 3px solid var(--orange);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 0.84rem; color: var(--text2);
}
.task-tip {
  margin-top: 1rem; padding: 0.75rem 1rem;
  background: var(--primary-soft); border-left: 3px solid var(--primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 0.84rem; color: var(--text2);
}
.task-tip strong { color: var(--primary); }
.task-done-bar { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }

/* Advanced tabs */
.adv-tabs { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.25rem 0 0; }
.adv-tab {
  padding: 0.45rem 1rem; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; transition: var(--transition);
}
.adv-tab.active, .adv-tab:hover { background: var(--primary-soft); border-color: rgba(28,85,187,0.3); color: var(--primary); }
.adv-panels { margin-top: 0; }
.adv-panel { display: none; padding: 1rem 0; }
.adv-panel.active { display: block; }
.adv-panel h4 { font-size: 0.9rem; color: var(--text); margin-bottom: 0.75rem; font-family: 'DM Sans', sans-serif; }
.adv-tryit { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 0.75rem; overflow: hidden; }
.adv-tryit-toggle {
  display: flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1rem;
  cursor: pointer; font-size: 0.84rem; font-weight: 600; color: var(--primary);
}
.adv-tryit-toggle svg { width: 16px; height: 16px; transition: transform 0.25s; }
.adv-tryit.open .adv-tryit-toggle svg { transform: rotate(180deg); }
.adv-tryit-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; padding: 0 1rem; }
.adv-tryit.open .adv-tryit-body { max-height: 1500px; padding: 0 1rem 1rem; }

/* ═══════ LEADERBOARD ═══════ */
.live-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: rgba(26,122,74,0.10); border: 1px solid rgba(26,122,74,0.25);
  padding: 0.2rem 0.65rem; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600; color: var(--green);
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
.leaderboard-wrapper { }
.leaderboard-refresh-bar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
.leaderboard-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.leaderboard-table th {
  padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid var(--border);
  background: var(--surface2);
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); font-weight: 700;
}
.leaderboard-table tr {
  border-bottom: 1px solid var(--border-light);
  animation: rowIn 0.4s ease both;
  animation-delay: calc(var(--row-index) * 0.04s);
}
@keyframes rowIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
.leaderboard-row-me { background: var(--primary-soft); }
.leaderboard-table td { padding: 0.75rem 1rem; color: var(--text2); background: var(--surface); }
.leaderboard-row-me td { background: rgba(28,85,187,0.05); }
.rank-badge {
  width: 28px; height: 28px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 700;
  background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
}
.rank-1 { background: rgba(255,215,0,0.15); color: #c8920a; border-color: rgba(255,215,0,0.4); }
.rank-2 { background: rgba(150,150,160,0.12); color: #666; border-color: rgba(150,150,160,0.3); }
.rank-3 { background: rgba(185,120,60,0.12); color: #9a5c20; border-color: rgba(185,120,60,0.3); }
.leaderboard-name { font-weight: 600; color: var(--text); }
.leaderboard-you-badge {
  display: inline-block; padding: 0.1rem 0.45rem; border-radius: 10px;
  background: var(--primary-soft); color: var(--primary); font-size: 0.72rem; font-weight: 600;
  margin-left: 0.4rem; vertical-align: middle; border: 1px solid rgba(28,85,187,0.2);
}
.leaderboard-points { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-weight: 700; }
.leaderboard-bar-cell { min-width: 120px; }
.leaderboard-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.leaderboard-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; transition: width 0.6s ease; }
.leaderboard-empty { padding: 3rem 0; text-align: center; color: var(--text-muted); }
.leaderboard-empty svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.3; }
.leaderboard-show-more { text-align: center; padding: 1rem 0; }

/* ═══════ ADMIN ═══════ */
.admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.admin-stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow-sm);
}
.admin-stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
.admin-stat-card .value { font-size: 2rem; font-weight: 800; font-family: 'Syne', sans-serif; color: var(--primary); }
.admin-table-wrap { overflow-x: auto; }
.admin-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.admin-table th { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); background: var(--surface2); font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); text-align: left; font-weight: 700; }
.admin-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border-light); color: var(--text2); }
.admin-table tr:hover td { background: var(--surface2); }
.admin-controls { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.admin-section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.admin-login-card { max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow-sm); }
.admin-login-card h2 { margin-bottom: 1.5rem; font-size: 1.1rem; font-family: 'DM Sans', sans-serif; color: var(--text); }
.steps-control { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
.step-toggle {
  padding: 0.35rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.78rem; font-weight: 600;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: var(--transition);
}
.step-toggle.hidden { background: var(--orange-soft); border-color: rgba(232,88,10,0.3); color: var(--orange); }

/* ═══════ CAST MODE ═══════ */
.cast-exit-btn {
  display: none; position: fixed; top: 1rem; right: 1rem; z-index: 100;
  padding: 0.45rem 1rem; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 0.8rem; font-weight: 600; cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.cast-mode .cast-exit-btn { display: block; }
.cast-mode .sidebar { display: none; }
.cast-mode .leaderboard-table { font-size: 1.1rem; }
.cast-mode .leaderboard-table th { font-size: 0.85rem; padding: 0.75rem 1.25rem; }
.cast-mode .leaderboard-table td { padding: 1rem 1.25rem; }
.cast-mode .rank-badge { width: 36px; height: 36px; font-size: 1rem; }
.cast-mode .page-header h1 { font-size: 2rem; }
.cast-stats-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.cast-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.5rem; box-shadow: var(--shadow-sm); }
.cast-stat-value { font-size: 2.5rem; font-weight: 800; font-family: 'Syne', sans-serif; color: var(--primary); }
.cast-stat-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.cast-stat-progress { flex: 1; min-width: 200px; }
.cast-progress-track { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.cast-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; }

/* ═══════ TOAST ═══════ */
.toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; }
.toast {
  padding: 0.65rem 1.25rem; border-radius: var(--radius-sm);
  font-size: 0.88rem; font-weight: 600;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.3s both;
  box-shadow: var(--shadow-md);
}
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-4px); } }
.toast.success { background: var(--primary); color: #fff; }
.toast.undo { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }

/* ═══════ OFFLINE BANNER ═══════ */
.offline-banner {
  display: none; position: fixed; top: 0; left: 0; right: 0;
  background: rgba(232,88,10,0.1); border-bottom: 1px solid rgba(232,88,10,0.3);
  color: var(--orange); text-align: center; font-size: 0.82rem; padding: 0.4rem; z-index: 200;
}
.offline-banner.visible { display: block; }

/* ═══════ LOCKOUT ═══════ */
.lockout-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
.lockout-card {
  text-align: center; padding: 3rem 2rem; max-width: 400px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-md);
}
.lockout-card .emoji { font-size: 3rem; margin-bottom: 1rem; }
.lockout-card h2 { color: var(--text); margin-bottom: 0.75rem; }
.lockout-card p { color: var(--text-muted); font-size: 0.88rem; }

/* ═══════ CELEBRATE ═══════ */
.clawd-celebration {
  display: none; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  z-index: 500; text-align: center; pointer-events: none;
}
.clawd-celebration.active { display: block; animation: celebPop 2.5s ease forwards; }
@keyframes celebPop {
  0% { opacity: 0; transform: translateX(-50%) scale(0.7); }
  15% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  20% { transform: translateX(-50%) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) scale(0.9); }
}
.clawd-celebration .celebrate-text {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; padding: 0.6rem 1.5rem; border-radius: 30px;
  font-weight: 800; font-size: 1.2rem; font-family: 'Syne', sans-serif;
  box-shadow: 0 4px 20px rgba(28,85,187,0.4);
}

/* ═══════ LOGIN CONFIRM BANNER ═══════ */
.login-confirm-banner {
  margin-top: 1rem; padding: 1rem 1.25rem;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: var(--radius-sm); font-size: 0.88rem; color: rgba(255,255,255,0.85);
}
.login-confirm-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
.login-confirm-actions .btn { width: auto; flex: 1; }
  </style>
</head>

//   API CLIENT (PostgreSQL Backend)
// ═══════════════════════════════════════════
const API_BASE = window.location.origin.includes('localhost')
  ? 'http://localhost:3002/api'
  : '/api';

const API = {
  token: null,

  setToken(token) {
    this.token = token;
    if (token) localStorage.setItem('auth_token', token);
    else localStorage.removeItem('auth_token');
  },

  getToken() {
    if (!this.token) this.token = localStorage.getItem('auth_token');
    return this.token;
  },

  async request(endpoint, options = {}) {
    const token = this.getToken();
    const headers = {
      'Content-Type': 'application/json',
      ...(token && { Authorization: `Bearer ${token}` }),
      ...options.headers
    };
    const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (!response.ok) {
      const error = await response.json().catch(() => ({ error: 'Request failed' }));
      throw new Error(error.error || 'Request failed');
    }
    return response.json();
  },

  async login(name, workshopCode) {
    const data = await this.request('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ name, workshopCode })
    });
    this.setToken(data.token);
    return data.user;
  },

  async adminLogin(password) {
    const data = await this.request('/auth/admin', {
      method: 'POST',
      body: JSON.stringify({ password })
    });
    this.setToken(data.token);
    return data;
  },

  async getParticipant() {
    return this.request('/participant');
  },

  async completeTask(taskId, points) {
    return this.request('/participant/complete-task', {
      method: 'POST',
      body: JSON.stringify({ taskId, points })
    });
  },

  async getLeaderboard(workshopCode) {
    return this.request(`/leaderboard/${workshopCode}`);
  },

  async getAdminStats(workshopCode) {
    return this.request(`/admin/stats/${workshopCode}`);
  },

  async resetWorkshop(workshopCode) {
    return this.request(`/admin/reset/${workshopCode}`, { method: 'DELETE' });
  }
};

const App = {
  currentView: 'workshop',
  user: null,
  workshopCode: null,
  completedTasks: new Set(),
  totalPoints: 0,
  isAdmin: false,
  _leaderboardTimer: null,

  init() {
    const token = localStorage.getItem('auth_token');
    const saved = localStorage.getItem('session');
    if (token && saved) {
      try {
        const s = JSON.parse(saved);
        this.user = s.user;
        this.workshopCode = s.workshopCode;
        this.isAdmin = s.isAdmin || false;
        // Reload from backend
        if (!this.isAdmin) {
          API.getParticipant().then(p => {
            this.completedTasks = new Set(p.completed_tasks || []);
            this.totalPoints = p.total_points || 0;
            this.updatePointsDisplay();
            if (this.currentView === 'workshop') this.renderWorkshop(document.getElementById('main-content'));
          }).catch(err => {
            console.error('Session restore failed:', err);
            localStorage.removeItem('auth_token');
            localStorage.removeItem('session');
            this.showLoginScreen();
          });
        }
        this.showApp(localStorage.getItem('currentView') || 'workshop');
        return;
      } catch {}
    }
    this.showLoginScreen();

    // Enter key for login
    document.getElementById('login-workshop').addEventListener('keydown', e => {
      if (e.key === 'Enter') this.login();
    });
    document.getElementById('login-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') this.login();
    });
    document.getElementById('admin-bootstrap-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') this.adminLogin();
    });
  },

  showLoginScreen() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-shell').classList.remove('active');
  },

  showAdminLogin(e) {
    e && e.preventDefault();
    document.getElementById('participant-login-card').style.display = 'none';
    document.getElementById('admin-login-card').style.display = '';
  },

  showParticipantLogin(e) {
    e && e.preventDefault();
    document.getElementById('admin-login-card').style.display = 'none';
    document.getElementById('participant-login-card').style.display = '';
  },

  async login() {
    const name = document.getElementById('login-name').value.trim();
    const code = document.getElementById('login-workshop').value.trim().toUpperCase();
    const error = document.getElementById('login-error');

    if (!name) { error.textContent = 'Please enter your name.'; error.classList.add('visible'); return; }
    if (!code) { error.textContent = 'Please enter the workshop code.'; error.classList.add('visible'); return; }

    error.classList.remove('visible');

    try {
      const user = await API.login(name, code);

      this.user = { name: user.name };
      this.workshopCode = user.workshopCode;
      this.completedTasks = new Set(user.completedTasks || []);
      this.totalPoints = user.totalPoints || 0;
      this.isAdmin = false;

      localStorage.setItem('session', JSON.stringify({ user: this.user, workshopCode: this.workshopCode, isAdmin: false }));
      this.showApp('workshop');
    } catch (err) {
      error.textContent = err.message || 'Login failed. Please try again.';
      error.classList.add('visible');
    }
  },

  async adminLogin() {
    const pw = document.getElementById('admin-bootstrap-password').value;
    const error = document.getElementById('admin-bootstrap-error');
    try {
      await API.adminLogin(pw);
      this.user = { name: 'Admin' };
      this.workshopCode = 'MINFY2026';
      this.isAdmin = true;
      localStorage.setItem('session', JSON.stringify({ user: this.user, workshopCode: this.workshopCode, isAdmin: true }));
      this.showApp('admin');
    } catch (err) {
      error.textContent = 'Incorrect password.';
      error.classList.add('visible');
    }
  },

  logout() {
    localStorage.removeItem('session');
    localStorage.removeItem('currentView');
    localStorage.removeItem('auth_token');
    API.token = null;
    this.user = null; this.workshopCode = null; this.isAdmin = false;
    this.completedTasks.clear(); this.totalPoints = 0;
    if (this._leaderboardTimer) clearInterval(this._leaderboardTimer);
    this.closeLeaderboardSSE();
    document.body.classList.remove('cast-mode');
    this.showLoginScreen();
  },

  showApp(view = 'workshop') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-shell').classList.add('active');
    document.getElementById('user-name-display').textContent = this.user.name;
    document.getElementById('user-avatar').textContent = this.user.name.charAt(0).toUpperCase();
    this.updatePointsDisplay();
    const badge = document.getElementById('workshop-badge');
    if (badge && this.workshopCode) { badge.textContent = this.workshopCode; badge.style.display = ''; }
    this.navigate(view);

    // Mobile menu
    document.getElementById('mobile-menu-btn').onclick = () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('mobile-overlay').classList.toggle('open');
    };
  },

  closeMobileMenu() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('mobile-overlay').classList.remove('open');
  },

  navigate(view) {
    this.currentView = view;
    localStorage.setItem('currentView', view);
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.view === view);
    });
    if (this._leaderboardTimer) { clearInterval(this._leaderboardTimer); this._leaderboardTimer = null; }
    if (view !== 'leaderboard') this.closeLeaderboardSSE();
    const main = document.getElementById('main-content');
    if (view === 'workshop') this.renderWorkshop(main);
    else if (view === 'leaderboard') this.renderLeaderboard(main);
    else if (view === 'cheatsheet') this.renderCheatsheet(main);
    else if (view === 'admin') this.renderAdmin(main);
    this.closeMobileMenu();
  },

  updatePointsDisplay() {
    const el = document.getElementById('user-points-display');
    if (el) el.textContent = `${this.totalPoints} XP`;
  },

  async toggleTask(taskId) {
    const task = TASKS.find(t => t.id === taskId);
    if (!task) return;
    const was = this.completedTasks.has(taskId);

    if (was) {
      this.showToast('Steps cannot be undone', 'undo');
      return;
    }

    try {
      const result = await API.completeTask(taskId, task.points);
      this.completedTasks.add(taskId);
      this.totalPoints = result.total_points;
      this.updatePointsDisplay();
      this.showToast(`+${task.points} XP earned!`, 'success');
      this.showCelebration();

      // Save scroll position before re-render
      const mainContent = document.getElementById('main-content');
      const scrollTop = mainContent ? mainContent.scrollTop : 0;
      this.renderWorkshop(mainContent);
      // Restore scroll position after re-render
      if (mainContent) mainContent.scrollTop = scrollTop;
    } catch (error) {
      console.error('Task completion error:', error);
      this.showToast(error.message || 'Failed to complete task', 'undo');
    }
  },

  isTaskUnlocked(taskId) {
    if (this.isAdmin) return true;
    const coreIndex = CORE_TASKS.findIndex(t => t.id === taskId);
    if (coreIndex >= 0) {
      for (let i = 0; i < coreIndex; i++) {
        if (!this.completedTasks.has(CORE_TASKS[i].id)) return false;
      }
      return true;
    }
    const bonusIndex = BONUS_TASKS.findIndex(t => t.id === taskId);
    if (bonusIndex >= 0) {
      if (CORE_TASKS.some(t => !this.completedTasks.has(t.id))) return false;
      for (let i = 0; i < bonusIndex; i++) {
        if (!this.completedTasks.has(BONUS_TASKS[i].id)) return false;
      }
      return true;
    }
    return true;
  },

  toggleExpand(taskId) {
    const task = TASKS.find(t => t.id === taskId);
    if (!task) return;
    const done = this.completedTasks.has(taskId);
    const unlocked = this.isTaskUnlocked(taskId);

    // Locked: can't open at all
    if (!unlocked) {
      this.showToast('Complete the previous step first', 'undo');
      return;
    }

    // Active (unlocked but not done): can't collapse — must complete it first
    if (!done) {
      this.showToast('Complete this step to move on', 'undo');
      return;
    }

    // Completed: allow toggle
    const card = document.querySelector(`[data-task-id="${taskId}"]`);
    if (card) card.classList.toggle('expanded');
  },

  showCelebration() {
    const el = document.getElementById('clawd-celebration');
    if (!el) return;
    el.classList.remove('active');
    void el.offsetWidth;
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 2500);
  },

  showToast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    if (!c) return;
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 2700);
  },

            <span>${REFERENCE_CONTENT.title}</span>
            <svg class="reference-chevron" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 10 13 14 9"/></svg>
          </div>
          <div class="reference-body">
            <div class="reference-body-inner">${REFERENCE_CONTENT.content}</div>
          </div>

        <div class="xp-legend">
          <span class="xp-legend-label">XP Tiers:</span>

        <div class="tasks-section-label">Expert Challenges</div>

      </div>
    `;
    this.addCopyButtons(container);
  },

  addCopyButtons(container) {
    container.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.title = 'Copy';
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
      btn.addEventListener('click', () => {
        const text = pre.querySelector('code')?.textContent || pre.textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          btn.classList.add('copied');

            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';

  renderTaskCard(task) {
    const done = this.completedTasks.has(task.id);
    const unlocked = this.isTaskUnlocked(task.id);
    const isActive = unlocked && !done; // currently in progress
    const tier = task.tier || 'core';

    // Active step is always expanded and can't be collapsed
    // Locked steps are never expanded
    // Completed steps default to collapsed (user can toggle)
    const expanded = isActive ? 'expanded' : '';
    const cls = ['task-card', done ? 'completed' : '', !unlocked ? 'locked' : '', expanded].filter(Boolean).join(' ');

    const tierConfig = {
      must:    { label: '🔴 Must Do',    cls: 'tier-must' },
      core:    { label: '🔵 Core',       cls: 'tier-core' },
      try:     { label: '🟡 Try It',     cls: 'tier-try' },
      stretch: { label: '🟢 Level Up',   cls: 'tier-stretch' },
      free:    { label: '🚀 Go Further', cls: 'tier-free' },
    };
    const tc = tierConfig[tier] || tierConfig.core;

    return `
      <div class="${cls}" data-task-id="${task.id}">
        <div class="task-header" onclick="App.toggleExpand('${task.id}')">
          <div class="task-status-icon ${done ? 'done' : ''}">
            ${done
              ? '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 10 8 14 16 6"/></svg>'
              : !unlocked
                ? '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="9" width="8" height="7" rx="1"/><path d="M7 9V7a3 3 0 016 0v2"/></svg>'
                : '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 10 13 14 9"/></svg>'
            }
          </div>
          <div class="task-info">
            <div class="task-title">${task.title}</div>
            ${!unlocked
              ? '<div class="task-subtitle locked-hint">Complete the previous step to unlock</div>'
              : task.subtitle ? `<div class="task-subtitle">${task.subtitle}</div>` : ''
            }
          </div>
          <div class="task-meta">
            <span class="task-points ${tc.cls}">${tc.label}</span>
            ${task.points > 0 ? `<span style="font-size:0.72rem;font-weight:700;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${task.points} XP</span>` : ''}
          </div>
        </div>
        <div class="task-body">
          <div class="task-body-inner">
            ${unlocked ? task.content : ''}
            ${unlocked ? `
            <div class="task-done-bar">
              <button class="btn btn-done ${done ? 'is-completed' : ''}" onclick="event.stopPropagation(); App.toggleTask('${task.id}')" ${done ? 'disabled style="cursor:default;opacity:0.8"' : ''}>
                ${done
                  ? '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;margin-right:0.35rem"><polyline points="4 10 8 14 16 6"/></svg> Completed — +' + task.points + ' XP'
                  : "Mark Complete"
                }
              </button>
            </div>` : ''}
          </div>
        </div>
      </div>
    `;
  },

  renderLeaderboard(container) {
    const isCast = document.body.classList.contains('cast-mode');
    container.innerHTML = `
      <div class="page-header">
        <div style="display:flex;align-items:center;gap:1rem">
          <h1>Leaderboard</h1>
          <span class="live-badge"><span class="live-dot"></span>Live</span>
        </div>
        <p>Workshop: <strong>${this.workshopCode || ''}</strong> — real-time updates via SSE</p>
      </div>
      <div class="page-body">
        <div class="leaderboard-refresh-bar">
          <button class="btn btn-ghost" onclick="App.toggleCastMode()">${isCast ? 'Exit Cast' : 'Cast Mode'}</button>
        </div>
        <div id="leaderboard-content"><div class="page-loading"><div class="spinner"></div> Connecting...</div></div>
      </div>
    `;
    this.connectLeaderboardSSE();
  },

  connectLeaderboardSSE() {
    // Close any existing SSE connection
    if (this._leaderboardSSE) {
      this._leaderboardSSE.close();
      this._leaderboardSSE = null;
    }

    const code = this.workshopCode || 'MINFY2026';
    const sseUrl = API_BASE.replace('/api', '') + `/api/leaderboard/${code}/stream`;
    const es = new EventSource(sseUrl);
    this._leaderboardSSE = es;

    es.onmessage = (event) => {
      try {
        const all = JSON.parse(event.data);
        this.renderLeaderboardData(all);
      } catch (err) {
        console.error('SSE parse error:', err);
      }
    };

    es.onerror = () => {
      // EventSource auto-reconnects, just log it
      console.warn('SSE connection lost, reconnecting...');
    };
  },

  closeLeaderboardSSE() {
    if (this._leaderboardSSE) {
      this._leaderboardSSE.close();
      this._leaderboardSSE = null;
    }
  },

  renderLeaderboardData(all) {
    const el = document.getElementById('leaderboard-content');
    if (!el) return;

    if (all.length === 0) {
      el.innerHTML = `<div class="leaderboard-empty"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 36V20M14 36V12M24 36V20M34 36V8M44 36V16"/></svg><p>No participants yet. Complete some tasks to appear here!</p></div>`;
      return;
    }
    const isCast = document.body.classList.contains('cast-mode');
    const maxPts = [...CORE_TASKS, ...BONUS_TASKS].reduce((s, t) => s + t.points, 0) || 1;
    const myName = this.user?.name || '';
    let castHtml = '';
    if (isCast) {
      const avgPct = all.length > 0 ? Math.round(all.reduce((s, p) => s + (p.total_points / (CORE_TASKS.reduce((x, t) => x + t.points, 0) || 1)) * 100, 0) / all.length) : 0;
      castHtml = `<div class="cast-stats-bar">
        <div class="cast-stat"><div class="cast-stat-value">${all.length}</div><div class="cast-stat-label">Participants</div></div>
        <div class="cast-stat cast-stat-progress">
          <div class="cast-stat-label" style="margin-bottom:0.4rem">Avg Progress</div>
          <div class="cast-progress-track"><div class="cast-progress-fill" style="width:${Math.min(avgPct,100)}%"></div></div>
          <div class="cast-stat-value" style="font-size:1.1rem;margin-top:0.3rem">${Math.min(avgPct,100)}%</div>
        </div>
      </div>`;
    }
    el.innerHTML = castHtml + `
      <table class="leaderboard-table">
        <thead><tr><th style="width:60px">Rank</th><th>Participant</th><th style="width:90px">XP</th><th style="width:80px">Steps</th><th>Progress</th></tr></thead>
        <tbody>
          ${all.map((p, i) => `
            <tr class="${p.name === myName ? 'leaderboard-row-me' : ''}" style="--row-index:${i}">
              <td><span class="rank-badge ${i < 3 ? `rank-${i+1}` : 'rank-other'}">${i+1}</span></td>
              <td class="leaderboard-name">${this.esc(p.name)}${p.name === myName ? ' <span class="leaderboard-you-badge">you</span>' : ''}</td>
              <td class="leaderboard-points">${p.total_points || 0} XP</td>
              <td style="color:var(--text-muted)">${(p.completed_tasks || []).length}</td>
              <td class="leaderboard-bar-cell"><div class="leaderboard-bar"><div class="leaderboard-bar-fill" style="width:${((p.total_points||0)/maxPts)*100}%"></div></div></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  },

  toggleCastMode() {
    document.body.classList.toggle('cast-mode');
    if (this.currentView === 'leaderboard') this.renderLeaderboard(document.getElementById('main-content'));
  },

        <div class="page-body"><p style="color:var(--text-muted)">Failed to load admin data. Is the backend running?</p></div>

  async inlineAdminAuth() {
    const pw = document.getElementById('admin-pw-inline').value;
    try {
      await API.adminLogin(pw);
      this.isAdmin = true;
      const s = JSON.parse(localStorage.getItem('session') || '{}');
      s.isAdmin = true; localStorage.setItem('session', JSON.stringify(s));
      this.renderAdmin(document.getElementById('main-content'));
    } catch (err) {
      const e = document.getElementById('admin-inline-error');
      e.textContent = 'Incorrect password.'; e.classList.add('visible');
    }
  },

  refreshAdmin() { this.renderAdmin(document.getElementById('main-content')); },

  resetParticipant(name) {
    // Individual reset not supported via API — use clear all
    this.showToast('Use "Clear All Data" to reset workshop', 'undo');
  },

  async confirmClear() {
    if (confirm('Clear ALL participant data for this workshop? This cannot be undone.')) {
      try {
        await API.resetWorkshop(this.workshopCode);
        this.showToast('All data cleared', 'undo');
        this.renderAdmin(document.getElementById('main-content'));
      } catch (error) {
        this.showToast('Failed to clear data', 'undo');
      }
    }
  },

  async exportCSV() {
    try {
      const all = await API.getLeaderboard(this.workshopCode);
      if (!all.length) { this.showToast('No data to export', 'undo'); return; }
      const rows = [['Name', 'Points', 'Tasks Completed', 'Completed Task IDs']];
      all.forEach(p => rows.push([p.name, p.total_points || 0, (p.completed_tasks||[]).length, (p.completed_tasks||[]).join('|')]));
      const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = `minfy-workshop-${this.workshopCode}-${Date.now()}.csv`;
      a.click();
    } catch (error) {
      this.showToast('Failed to export data', 'undo');
    }
  },

    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
