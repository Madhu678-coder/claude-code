server {
    listen 80;
    server_name claude-workshop.coebuilds.swayam.ai;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name claude-workshop.coebuilds.swayam.ai;

    ssl_certificate /etc/letsencrypt/live/claude-workshop.coebuilds.swayam.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claude-workshop.coebuilds.swayam.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE streams — disable buffering for real-time delivery
    location ~ /api/leaderboard/.+/stream$ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}
